
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-toggle" title="Toggle Dark/Light Mode">🌓</button>
    <div class="container">
        <h1>Lotto Number Generator</h1>
        <div id="lotto-numbers" class="lotto-numbers-container"></div>
        <button id="generate-btn">Generate Numbers</button>
    </div>

    <div class="container contact-container">
        <h2>Partnership Inquiry</h2>
        <form action="https://formspree.io/f/xykbqkna" method="POST" id="contact-form">
            <div class="form-group">
                <input type="text" name="name" placeholder="Your Name" required>
            </div>
            <div class="form-group">
                <input type="email" name="email" placeholder="Your Email" required>
            </div>
            <div class="form-group">
                <textarea name="message" placeholder="How can we help you?" required></textarea>
            </div>
            <button type="submit" id="submit-btn">Send Message</button>
        </form>
    </div>
    <script src="main.js"></script>
</body>
</html>
